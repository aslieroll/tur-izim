<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tur Oluştur - Adım 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "outline": "#7a7582",
                        "surface-dim": "#ded8e0",
                        "on-tertiary-fixed": "#241a00",
                        "surface-tint": "#6750a4",
                        "on-primary-fixed-variant": "#4f378a",
                        "on-secondary-container": "#645a7d",
                        "on-secondary-fixed": "#1f1635",
                        "inverse-surface": "#322f35",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface": "#fdf7ff",
                        "surface-container-high": "#ece6ee",
                        "on-secondary-fixed-variant": "#4b4263",
                        "inverse-primary": "#cfbcff",
                        "primary-fixed-dim": "#cfbcff",
                        "on-primary-container": "#e0d2ff",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#e1d4fd",
                        "primary-fixed": "#e9ddff",
                        "on-error": "#ffffff",
                        "on-background": "#1d1b20",
                        "primary": "#4f378a",
                        "tertiary-container": "#c9a74d",
                        "surface-container": "#f2ecf4",
                        "outline-variant": "#cbc4d2",
                        "on-tertiary-fixed-variant": "#594400",
                        "on-primary-fixed": "#22005d",
                        "secondary-fixed": "#e9ddff",
                        "background": "#fdf7ff",
                        "tertiary": "#765b00",
                        "surface-container-highest": "#e6e0e9",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f5eff7",
                        "on-surface-variant": "#494551",
                        "secondary": "#63597c",
                        "surface-bright": "#fdf7ff",
                        "primary-container": "#6750a4",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "on-surface": "#1d1b20",
                        "secondary-fixed-dim": "#cdc0e9",
                        "tertiary-fixed": "#ffdf93",
                        "surface-container-low": "#f8f2fa",
                        "on-tertiary-container": "#503d00",
                        "tertiary-fixed-dim": "#e7c365",
                        "surface-variant": "#e6e0e9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem",
                        "3xl": "1.5rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "stack-md": "16px",
                        "margin-page": "24px",
                        "gutter-card": "16px",
                        "section-gap": "48px",
                        "stack-sm": "8px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "h2": ["Plus Jakarta Sans"],
                        "h1": ["Noto Serif"],
                        "display": ["Noto Serif"],
                        "button": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "h2": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "h1": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "display": ["34px", { "lineHeight": "42px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "button": ["16px", { "lineHeight": "20px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32 md:pb-0">
<!-- TopAppBar -->
<header class="bg-white/90 backdrop-blur-lg dark:bg-slate-950/90 text-indigo-900 dark:text-indigo-100 font-['Noto_Serif'] font-semibold tracking-tight fixed top-0 w-full z-50 shadow-[0_4px_20px_rgba(30,42,90,0.04)] flex justify-between items-center px-6 h-16 w-full">
<button class="hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined text-indigo-900 dark:text-indigo-200">arrow_back</span>
</button>
<div class="text-indigo-950 dark:text-white font-serif italic font-bold text-xl">Tur İzim</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content -->
<main class="pt-[100px] px-margin-page max-w-3xl mx-auto">
<!-- Header Section -->
<div class="mb-stack-lg">
<div class="flex items-center gap-2 mb-2 text-primary font-label-caps text-label-caps">
<span class="material-symbols-outlined text-[16px]">steps</span>
<span>ADIM 1 / 3</span>
</div>
<h1 class="font-display text-display text-on-background mb-stack-sm">Yeni Tur Oluştur</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Turunuzun temel bilgilerini girerek harika bir deneyim tasarlamaya başlayın.</p>
</div>
<!-- Form Form -->
<form class="space-y-section-gap">
<!-- Section: Temel Bilgiler -->
<div class="bg-surface-container-lowest rounded-3xl p-6 md:p-8 shadow-[0_8px_30px_rgba(30,42,90,0.04)]">
<h2 class="font-h2 text-h2 text-on-surface mb-stack-md flex items-center gap-2">
<span class="material-symbols-outlined text-primary">info</span>
                    Temel Bilgiler
                </h2>
<div class="space-y-stack-md">
<!-- Tur Başlığı -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="tur_basligi">Tur Başlığı</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">title</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-2xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="tur_basligi" placeholder="Örn: Kapadokya Balon Turu" type="text"/>
</div>
</div>
<!-- Rota Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Kalkış Şehri -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="kalkis_sehri">Kalkış Şehri</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">flight_takeoff</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-2xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="kalkis_sehri" placeholder="Nereden?" type="text"/>
</div>
</div>
<!-- Varış Şehri -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="varis_sehri">Varış Şehri</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">flight_land</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-2xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="varis_sehri" placeholder="Nereye?" type="text"/>
</div>
</div>
</div>
<!-- Tarih Aralığı -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="tarih">Tarih Aralığı</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">calendar_month</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-2xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="tarih" placeholder="Başlangıç - Bitiş" type="text"/>
</div>
</div>
</div>
</div>
<!-- Section: Finansal Bilgiler -->
<div class="bg-surface-container-lowest rounded-3xl p-6 md:p-8 shadow-[0_8px_30px_rgba(30,42,90,0.04)]">
<h2 class="font-h2 text-h2 text-on-surface mb-stack-md flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary-container">payments</span>
                    Finansal Bilgiler
                </h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Tahmini Değer -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="tahmini_deger">Tahmini Değer (₺)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">account_balance_wallet</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-2xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="tahmini_deger" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Gerekli Depozito -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="gerekli_depozito">Gerekli Depozito (%)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">percent</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-2xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="gerekli_depozito" placeholder="Örn: 20" type="number"/>
</div>
</div>
</div>
</div>
<!-- Action Area -->
<div class="pt-stack-md flex justify-end">
<button class="bg-primary hover:bg-primary-container hover:text-on-primary-container text-on-primary font-button text-button py-4 px-8 rounded-full shadow-[0_4px_12px_rgba(79,55,138,0.2)] transition-all flex items-center gap-2 w-full md:w-auto justify-center" type="button">
                    Devam Et
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
</main>
</body></html>
