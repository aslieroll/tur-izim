<body class="bg-background text-on-background antialiased min-h-screen">
<!-- TopAppBar -->
<header class="bg-white/90 backdrop-blur-lg dark:bg-slate-950/90 text-indigo-900 dark:text-indigo-100 font-['Noto_Serif'] font-semibold tracking-tight fixed top-0 w-full z-50 border-b border-slate-100/50 dark:border-slate-800/50 shadow-[0_4px_20px_rgba(30,42,90,0.04)] flex justify-between items-center px-6 h-16 w-full">
<div class="text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors Active: opacity-70 scale-95 transition-all p-2 rounded-full cursor-pointer">
<span class="material-symbols-outlined block" data-icon="menu">menu</span>
</div>
<div class="text-indigo-950 dark:text-white font-serif italic font-bold text-xl">Tur İzim</div>
<div class="text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors Active: opacity-70 scale-95 transition-all p-2 rounded-full cursor-pointer">
<span class="material-symbols-outlined block" data-icon="search">search</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-[88px] px-margin-page pb-[120px] max-w-2xl mx-auto flex flex-col gap-section-gap">
<section class="flex flex-col gap-stack-lg">
<div>
<h1 class="font-h1 text-h1 text-primary">Başvuru Formu</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-stack-sm">Lütfen aşağıdaki bilgileri eksiksiz doldurun.</p>
</div>
<form class="flex flex-col gap-stack-lg bg-surface-container-lowest p-[24px] rounded-[16px] shadow-[0_8px_20px_rgba(30,42,90,0.04)]">
<!-- Text Field: Motivation -->
<div class="flex flex-col gap-[8px]">
<label class="font-label-caps text-label-caps text-primary uppercase" for="motivation">Neden katılmak istiyorsun?</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded-lg p-4 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors resize-none" id="motivation" placeholder="Motivasyonunuzu kısaca açıklayın..." rows="4"></textarea>
</div>
<!-- Input Field: URL -->
<div class="flex flex-col gap-[8px]">
<label class="font-label-caps text-label-caps text-primary uppercase" for="portfolio_url">Örnek İçerik URL</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="portfolio_url" placeholder="https://..." type="url"/>
</div>
<!-- Checkboxes -->
<div class="flex flex-col gap-stack-md mt-4 pt-4 border-t border-outline-variant/30">
<label class="flex items-start gap-4 cursor-pointer group">
<div class="relative flex items-center mt-1">
<input class="peer appearance-none w-5 h-5 border-2 border-outline rounded-sm checked:bg-primary checked:border-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white text-[16px] opacity-0 peer-checked:opacity-100 pointer-events-none" data-icon="check">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">30 günlük yayın taahhüdünü kabul ediyorum.</span>
</label>
<label class="flex items-start gap-4 cursor-pointer group">
<div class="relative flex items-center mt-1">
<input class="peer appearance-none w-5 h-5 border-2 border-outline rounded-sm checked:bg-primary checked:border-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white text-[16px] opacity-0 peer-checked:opacity-100 pointer-events-none" data-icon="check">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Ürettiğim içeriklerin acente tarafından kullanılabileceğini kabul ediyorum.</span>
</label>
<label class="flex items-start gap-4 cursor-pointer group">
<div class="relative flex items-center mt-1">
<input class="peer appearance-none w-5 h-5 border-2 border-outline rounded-sm checked:bg-primary checked:border-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white text-[16px] opacity-0 peer-checked:opacity-100 pointer-events-none" data-icon="check">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Paylaşımı 30 gün içinde kaldırırsam tur bedelinin talep edilebileceği konusunda bilgilendirildim.</span>
</label>
</div>
<!-- CTA -->
<button class="mt-8 w-full bg-primary text-on-primary font-button text-button py-4 px-6 rounded-full shadow-[0_4px_12px_rgba(79,55,138,0.2)] hover:shadow-[0_6px_16px_rgba(79,55,138,0.3)] hover:-translate-y-0.5 transition-all active:scale-[0.98]" type="button">
                    Başvuruyu Gönder
                </button>
</form>
</section>
</main>

<span class="material-symbols-outlined text-[24px]" data-icon="explore">explore</span>
<span class="text-[11px] font-medium tracking-wide uppercase">Tours</span>
</a>
<a class="flex flex-col items-center justify-center text-white relative after:content-[''] after:absolute after:-bottom-1 after:w-1.5 after:h-1.5 after:bg-orange-400 after:rounded-full hover:text-white transition-all Active: scale-90 duration-200 gap-1 w-16" href="#">

<span class="text-[11px] font-medium tracking-wide uppercase">Applications</span>

<span class="text-[11px] font-medium tracking-wide uppercase">Profile</span>
</a>
