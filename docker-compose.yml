services:
  postgres:
    image: postgres:16-alpine
    container_name: tur-izim-postgres
    environment:
      POSTGRES_DB: turizim
      POSTGRES_USER: turizim
      POSTGRES_PASSWORD: turizim_dev
    ports:
      - "5432:5432"
    volumes:
      - tur-izim-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turizim -d turizim"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tur-izim-pgdata:
