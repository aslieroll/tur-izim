spring:
  application:
    name: tur-izim-backend

  # Öncelik: standart Spring env (SPRING_DATASOURCE_*) → eski yerel env (DB_*) → yerel varsayılan.
  # Railway gibi platformlarda SPRING_DATASOURCE_URL ile açık JDBC URL verin
  # (örn. jdbc:postgresql://host:5432/railway).
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/turizim}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:turizim}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:turizim_dev_password}}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# Railway/Heroku tarzı platformlar PORT verir; yerelde 8080.
server:
  port: ${PORT:${SERVER_PORT:8080}}

# Yerel: boş DB'de DevDataLoader çalışır. Test profili kapalı.
app:
  dev-seed: ${APP_DEV_SEED:true}
  # Üretimde dağıtılan frontend origin'i (örn. https://tur-izim.vercel.app).
  # Virgülle birden fazla origin verilebilir; boşsa yalnızca localhost geliştirme origin'leri açık.
  cors:
    frontend-origin: ${FRONTEND_ORIGIN:}
  # Harici ödeme linkleri (harici checkout; uygulama içinde kart işleme yok).
  # Boşsa /api/billing/agency/checkout 422 döner; frontend güvenli mesaj gösterir.
  billing:
    agency-pro-payment-link: ${AGENCY_PRO_PAYMENT_LINK:}
    agency-growth-payment-link: ${AGENCY_GROWTH_PAYMENT_LINK:}
  # İlk üretim/beta ADMIN hesabı (genel API yok; yalnızca startup bootstrap).
  # Bir kez deploy sonrası false yapın; şifre asla repoya yazılmaz.
  admin-bootstrap:
    enabled: ${APP_ADMIN_BOOTSTRAP_ENABLED:false}
    email: ${APP_ADMIN_EMAIL:}
    password: ${APP_ADMIN_PASSWORD:}
  # AI Match Assistant: anahtar boşsa LLM atlanır ve deterministik fallback özet döner.
  ai:
    openrouter:
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:openai/gpt-4o-mini}
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
  # TODO(Flutter): Authorization: Bearer <JWT>; false iken korumalı uçlar 401/403 döner.
  security:
    legacy-open-api: ${APP_LEGACY_OPEN_API:true}
    jwt:
      secret: ${JWT_SECRET:01234567890123456789012345678901234567890123456789012345678901234567890123456789012}
      expiration-ms: ${JWT_EXP_MS:3600000}
