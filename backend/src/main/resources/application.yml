spring:
  application:
    name: tur-izim-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/turizim}
    username: ${DB_USERNAME:turizim}
    password: ${DB_PASSWORD:turizim_dev_password}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

# Yerel: boş DB'de DevDataLoader çalışır. Test profili kapalı.
app:
  dev-seed: ${APP_DEV_SEED:true}
