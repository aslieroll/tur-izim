<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen pb-safe pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-lg dark:bg-slate-950/90 shadow-[0_4px_20px_rgba(30,42,90,0.04)]">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-7xl mx-auto border-b border-slate-100/50 dark:border-slate-800/50">
<button class="text-indigo-900 dark:text-indigo-100 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors p-2 rounded-full active:opacity-70 active:scale-95 transition-all">
<span class="material-symbols-outlined">menu</span>
</button>
<div class="text-indigo-950 dark:text-white font-serif italic font-bold text-xl tracking-tight">Tur İzim</div>
<button class="text-indigo-900 dark:text-indigo-100 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors p-2 rounded-full active:opacity-70 active:scale-95 transition-all">
<span class="material-symbols-outlined">search</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-margin-page max-w-3xl mx-auto space-y-section-gap">
<!-- Header Section -->
<section class="space-y-stack-sm text-center">
<p class="font-label-caps text-label-caps text-primary uppercase">Adım 2 / 3</p>
<h1 class="font-h1 text-h1 text-on-background">İçerik Kriterleri Belirleme</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-md mx-auto">İçerik üreticilerinden beklediğiniz teknik özellikleri ve yayın platformlarını seçin.</p>
</section>
<!-- Form Area -->
<form class="space-y-stack-lg">
<!-- Teknik Format Bento Box -->
<div class="bg-surface-container-lowest rounded-xl p-gutter-card shadow-[0_8px_20px_rgba(30,42,90,0.04)] border border-surface-container-highest">
<h2 class="font-h2 text-h2 text-on-background mb-stack-md flex items-center gap-2">
<span class="material-symbols-outlined text-primary">videocam</span>
                    Teknik Format
                </h2>
<div class="grid grid-cols-2 gap-stack-md">
<label class="relative flex cursor-pointer group">
<input checked="" class="peer sr-only" name="format" type="radio"/>
<div class="w-full p-4 rounded-lg border border-outline-variant bg-surface hover:bg-surface-container transition-colors peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container">
<span class="material-symbols-outlined mb-2 text-primary">smartphone</span>
<div class="font-button text-button text-on-background group-hover:text-primary peer-checked:text-on-primary-container">Dikey (9:16)</div>
<div class="font-body-sm text-sm text-on-surface-variant peer-checked:text-on-primary-container/80">Reels, TikTok, Shorts</div>
</div>
<span class="absolute top-4 right-4 material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity icon-fill">check_circle</span>
</label>
<label class="relative flex cursor-pointer group">
<input class="peer sr-only" name="format" type="radio"/>
<div class="w-full p-4 rounded-lg border border-outline-variant bg-surface hover:bg-surface-container transition-colors peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container">
<span class="material-symbols-outlined mb-2 text-primary">desktop_windows</span>
<div class="font-button text-button text-on-background group-hover:text-primary peer-checked:text-on-primary-container">Yatay (16:9)</div>
<div class="font-body-sm text-sm text-on-surface-variant peer-checked:text-on-primary-container/80">YouTube, Web Sitesi</div>
</div>
<span class="absolute top-4 right-4 material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity icon-fill">check_circle</span>
</label>
</div>
<div class="mt-stack-md">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-stack-sm">Çözünürlük Kalitesi</label>
<div class="flex gap-4">
<label class="flex items-center gap-2 cursor-pointer">
<input class="text-primary focus:ring-primary h-5 w-5 border-outline-variant" name="resolution" type="radio"/>
<span class="font-body-md text-body-md text-on-background">1080p HD</span>
</label>
<label class="flex items-center gap-2 cursor-pointer">
<input checked="" class="text-primary focus:ring-primary h-5 w-5 border-outline-variant" name="resolution" type="radio"/>
<span class="font-body-md text-body-md text-on-background">4K Ultra HD</span>
</label>
</div>
</div>
</div>
<!-- Yayın Platformları -->
<div class="bg-surface-container-lowest rounded-xl p-gutter-card shadow-[0_8px_20px_rgba(30,42,90,0.04)] border border-surface-container-highest">
<h2 class="font-h2 text-h2 text-on-background mb-stack-md flex items-center gap-2">
<span class="material-symbols-outlined text-primary">campaign</span>
                    Yayın Platformları
                </h2>
<div class="space-y-4">
<label class="flex items-center justify-between p-4 rounded-lg border border-outline-variant bg-surface cursor-pointer hover:bg-surface-container transition-colors">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-[#E1306C]/10 flex items-center justify-center text-[#E1306C]">
<span class="material-symbols-outlined">photo_camera</span>
</div>
<div>
<div class="font-button text-button text-on-background">Instagram</div>
<div class="font-body-sm text-sm text-on-surface-variant">Reels &amp; Post</div>
</div>
</div>
<input checked="" class="rounded text-primary focus:ring-primary h-6 w-6 border-outline-variant" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 rounded-lg border border-outline-variant bg-surface cursor-pointer hover:bg-surface-container transition-colors">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-black/5 flex items-center justify-center text-black">
<span class="material-symbols-outlined">music_note</span>
</div>
<div>
<div class="font-button text-button text-on-background">TikTok</div>
<div class="font-body-sm text-sm text-on-surface-variant">Kısa Video</div>
</div>
</div>
<input class="rounded text-primary focus:ring-primary h-6 w-6 border-outline-variant" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 rounded-lg border border-outline-variant bg-surface cursor-pointer hover:bg-surface-container transition-colors">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-[#FF0000]/10 flex items-center justify-center text-[#FF0000]">
<span class="material-symbols-outlined">play_arrow</span>
</div>
<div>
<div class="font-button text-button text-on-background">YouTube</div>
<div class="font-body-sm text-sm text-on-surface-variant">Shorts &amp; Vlogs</div>
</div>
</div>
<input class="rounded text-primary focus:ring-primary h-6 w-6 border-outline-variant" type="checkbox"/>
</label>
</div>
</div>
<!-- Kayıt ve Taahhütler -->
<div class="bg-surface-container-low rounded-xl p-gutter-card border border-surface-container-highest">
<div class="flex items-start gap-4">
<span class="material-symbols-outlined text-tertiary-container mt-1 icon-fill">verified_user</span>
<div>
<h3 class="font-h2 text-h2 text-on-background mb-2">Kayıt ve Taahhütler</h3>
<p class="font-body-md text-body-md text-on-surface-variant mb-4">İçerik üreticilerinin uyması gereken zorunlu şartlar.</p>
<div class="space-y-3">
<label class="flex items-start gap-3 cursor-pointer">
<input checked="" class="rounded text-primary focus:ring-primary h-5 w-5 border-outline-variant mt-0.5" disabled="" type="checkbox"/>
<span class="font-body-md text-body-md text-on-background">Orijinal yüksek çözünürlüklü ham dosyaların teslimi.</span>
</label>
<label class="flex items-start gap-3 cursor-pointer">
<input checked="" class="rounded text-primary focus:ring-primary h-5 w-5 border-outline-variant mt-0.5" type="checkbox"/>
<span class="font-body-md text-body-md text-on-background">Yayınlanan içeriklerin en az 6 ay platformda kalması.</span>
</label>
<label class="flex items-start gap-3 cursor-pointer">
<input class="rounded text-primary focus:ring-primary h-5 w-5 border-outline-variant mt-0.5" type="checkbox"/>
<span class="font-body-md text-body-md text-on-background">Marka etiketleme ve işbirliği onaylarının eksiksiz yapılması.</span>
</label>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-8">
<button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-button text-button py-4 rounded-full shadow-[0_4px_14px_rgba(79,55,138,0.3)] transition-all flex justify-center items-center gap-2" type="button">
                    Turu Yayınla
                    <span class="material-symbols-outlined">rocket_launch</span>
</button>
<div class="text-center mt-4">
<button class="text-primary font-button text-button hover:underline" type="button">Geri Dön</button>
</div>
</div>
</form>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 rounded-t-[32px] bg-indigo-950/95 backdrop-blur-xl dark:bg-slate-950/95 shadow-[0_-8px_30px_rgba(0,0,0,0.15)] flex justify-around items-center h-20 px-8 pb-safe">
<button class="flex flex-col items-center justify-center text-white relative after:content-[''] after:absolute after:-bottom-1 after:w-1.5 after:h-1.5 after:bg-orange-400 after:rounded-full hover:text-white transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1">explore</span>
<span class="text-[11px] font-medium tracking-wide uppercase">Tours</span>
</button>
<button class="flex flex-col items-center justify-center text-indigo-300/60 dark:text-slate-500 hover:text-white transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1">assignment_ind</span>
<span class="text-[11px] font-medium tracking-wide uppercase">Applications</span>
</button>
<button class="flex flex-col items-center justify-center text-indigo-300/60 dark:text-slate-500 hover:text-white transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1">person</span>
<span class="text-[11px] font-medium tracking-wide uppercase">Profile</span>
</button>
</nav>
</body></html>
