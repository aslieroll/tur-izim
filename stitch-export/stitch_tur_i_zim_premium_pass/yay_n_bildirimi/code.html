</div>
<h1 class="font-h1 text-h1 text-primary">Yayın Bildirimi</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-md">Harika içeriğini tamamladın! Şimdi paylaşım linkini bize ileterek onay sürecini başlatabilirsin.</p>
</div>
<!-- Form Card -->
<div class="glass-panel rounded-xl p-6 md:p-8 flex flex-col gap-stack-lg">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-secondary uppercase" for="url-input">Canlı Yayın URL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">link</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow placeholder:text-outline-variant" id="url-input" placeholder="Örn: https://www.instagram.com/reel/..." type="url"/>
</div>
</div>
<!-- Reminder Banner -->
<div class="bg-secondary-container rounded-lg p-4 flex gap-4 items-start">
<span class="material-symbols-outlined text-primary mt-1" data-icon="info">info</span>
<div class="flex flex-col">

<p class="font-body-md text-body-md text-on-secondary-container opacity-80 mt-1">Paylaşım en az 30 gün yayında kalmalıdır. Depozito iadesi bildirim sonrası tetiklenir.</p>
</div>
</div>
